    <!-- Loading Screen Styles -->
    <style>
      #loading-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        opacity: 1;
        transition: opacity 0.5s ease-out;
      }
      
      #loading-screen.fade-out {
        opacity: 0;
        pointer-events: none;
      }
      
      .loading-logo {
        width: 120px;
        height: 120px;
        background-image: url('/lovable-uploads/faa2b9c5-2be6-4b90-8c9b-ca59e3e7a6d8.png');
        background-size: cover;
        background-position: center;
        border-radius: 20px;
        margin-bottom: 24px;
        animation: pulse 2s infinite;
        box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      }
      
      .loading-text {
        color: white;
        font-size: 24px;
        font-weight: bold;
        margin-bottom: 16px;
        text-align: center;
      }
      
      .loading-subtitle {
        color: rgba(255,255,255,0.8);
        font-size: 16px;
        text-align: center;
        max-width: 300px;
      }
      
      .loading-spinner {
        width: 40px;
        height: 40px;
        border: 4px solid rgba(255,255,255,0.3);
        border-top: 4px solid white;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-top: 24px;
      }
      
      @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.05); }
      }
      
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
    </style>

  <body>
    <!-- Loading Screen -->
    <div id="loading-screen">
      <div class="loading-logo"></div>
      <div class="loading-text">AgriSmart</div>
      <div class="loading-subtitle">Smart Farming & Precision Agriculture</div>
      <div class="loading-spinner"></div>
    </div>
    
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Enhanced Service Worker Registration -->
    <script>
      // Global variable to store install prompt
      let deferredPrompt = null;
      let installPromptFired = false;

      // Hide loading screen after app loads
      window.addEventListener('load', () => {
        setTimeout(() => {
          const loadingScreen = document.getElementById('loading-screen');
          if (loadingScreen) {
            loadingScreen.classList.add('fade-out');
            setTimeout(() => {
              loadingScreen.style.display = 'none';
            }, 500);
          }
        }, 1500);
      });

      // Register service worker immediately
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js')
          .then((registration) => {
            console.log('AgriSmart SW registered: ', registration);
            
            // Check for updates more frequently
            setInterval(() => {
              registration.update();
            }, 30000); // Check every 30 seconds
          })
          .catch((registrationError) => {
            console.log('AgriSmart SW registration failed: ', registrationError);
          });
      }

      // Enhanced PWA install detection
      window.addEventListener('beforeinstallprompt', (e) => {
        console.log('beforeinstallprompt event fired');
        e.preventDefault();
        deferredPrompt = e;
        installPromptFired = true;
        
        // Dispatch custom event that React components can listen to
        window.dispatchEvent(new CustomEvent('pwaInstallAvailable', { 
          detail: { prompt: e } 
        }));
        
        // Show immediate notification
        console.log('PWA install prompt is now available');
      });

      window.addEventListener('appinstalled', (evt) => {
        console.log('AgriSmart: App installed successfully');
        deferredPrompt = null;
        
        // Dispatch custom event
        window.dispatchEvent(new CustomEvent('pwaInstalled'));
      });

      // Detect if running as installed app
      if (window.matchMedia('(display-mode: standalone)').matches) {
        console.log('AgriSmart: Running as installed app');
        document.body.classList.add('installed-app');
      }

      // For iOS devices, show install instructions after delay
      const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
      if (isIOS && !window.matchMedia('(display-mode: standalone)').matches) {
        setTimeout(() => {
          if (!installPromptFired) {
            console.log('iOS device detected, install prompt available');
            window.dispatchEvent(new CustomEvent('pwaInstallAvailable', { 
              detail: { isIOS: true } 
            }));
          }
        }, 2000);
      }

      // Fallback for browsers that don't fire beforeinstallprompt
      setTimeout(() => {
        if (!installPromptFired && !window.matchMedia('(display-mode: standalone)').matches) {
          console.log('Fallback install prompt trigger');
          window.dispatchEvent(new CustomEvent('pwaInstallAvailable', { 
            detail: { fallback: true } 
          }));
        }
      }, 5000);
    </script>
