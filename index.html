    <!-- Loading Screen Styles -->
    <style>
      #loading-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        opacity: 1;
        transition: opacity 0.5s ease-out;
      }
      
      #loading-screen.fade-out {
        opacity: 0;
        pointer-events: none;
      }
      
      .loading-logo {
        width: 120px;
        height: 120px;
        background-image: url('https://images.unsplash.com/photo-1498050108023-c5249f4df085');
        background-size: cover;
        background-position: center;
        border-radius: 20px;
        margin-bottom: 24px;
        animation: pulse 2s infinite;
        box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      }
      
      .loading-text {
        color: white;
        font-size: 24px;
        font-weight: bold;
        margin-bottom: 16px;
        text-align: center;
      }
      
      .loading-subtitle {
        color: rgba(255,255,255,0.8);
        font-size: 16px;
        text-align: center;
        max-width: 300px;
      }
      
      .loading-spinner {
        width: 40px;
        height: 40px;
        border: 4px solid rgba(255,255,255,0.3);
        border-top: 4px solid white;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-top: 24px;
      }
      
      @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.05); }
      }
      
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <!-- Loading Screen -->
    <div id="loading-screen">
      <div class="loading-logo"></div>
      <div class="loading-text">AgriSmart</div>
      <div class="loading-subtitle">Smart Farming & Precision Agriculture</div>
      <div class="loading-spinner"></div>
    </div>
    
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Enhanced Service Worker Registration -->
    <script>
      // Hide loading screen after app loads
      window.addEventListener('load', () => {
        setTimeout(() => {
          const loadingScreen = document.getElementById('loading-screen');
          if (loadingScreen) {
            loadingScreen.classList.add('fade-out');
            setTimeout(() => {
              loadingScreen.style.display = 'none';
            }, 500);
          }
        }, 1500); // Show loading screen for at least 1.5 seconds
      });

      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((registration) => {
              console.log('AgriSmart SW registered: ', registration);
              
              // Check for updates every 60 seconds
              setInterval(() => {
                registration.update();
              }, 60000);
            })
            .catch((registrationError) => {
              console.log('AgriSmart SW registration failed: ', registrationError);
            });
        });
      }

      // Enhanced PWA install detection
      let deferredPrompt;
      
      window.addEventListener('beforeinstallprompt', (e) => {
        console.log('AgriSmart: beforeinstallprompt fired');
        e.preventDefault();
        deferredPrompt = e;
        
        // Auto-trigger install prompt after short delay
        setTimeout(() => {
          if (deferredPrompt) {
            console.log('AgriSmart: Auto-triggering install prompt');
            deferredPrompt.prompt();
            deferredPrompt.userChoice.then((choiceResult) => {
              console.log('AgriSmart: User choice:', choiceResult.outcome);
              deferredPrompt = null;
            });
          }
        }, 3000);
      });

      window.addEventListener('appinstalled', (evt) => {
        console.log('AgriSmart: App installed successfully');
      });

      // Detect if running as installed app
      if (window.matchMedia('(display-mode: standalone)').matches) {
        console.log('AgriSmart: Running as installed app');
        document.body.classList.add('installed-app');
      }
    </script>
  </body>
